<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Winamp</title>
        <style>
            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: #c0c0c0;
                font-family: system-ui, -apple-system, Segoe UI, Roboto,
                    sans-serif;
            }
            #winamp-container {
                position: relative;
                width: 100%;
                height: 100%;
            }
            #boot {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                gap: 10px;
                color: #111;
                padding: 16px;
                box-sizing: border-box;
                text-align: center;
            }
            .hint {
                font-size: 12px;
                opacity: 0.8;
            }
        </style>
    </head>
    <body>
        <div id="winamp-container">
            <div id="boot">
                <div><b>Loading Winamp…</b></div>
                <div class="hint">Tip: click Play to start audio.</div>
            </div>
        </div>

        <script src="/vendor/webamp/webamp.bundle.min.js"></script>
        <script>
            (function () {
                const boot = document.getElementById('boot');
                const container = document.getElementById('winamp-container');

                if (!container) {
                    return;
                }

                if (!window.Webamp) {
                    if (boot) {
                        boot.innerHTML =
                            '<div><b>Webamp failed to load.</b></div><div class="hint">Please refresh.</div>';
                    }
                    return;
                }

                const album = 'Sleep Protocol Soundtrack';
                const initialTracks = [
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Diablo_Swing_Orchestra_-_01_-_Heroines.mp3',
                        duration: 322.612245,
                        metaData: {
                            title: 'Heroines',
                            artist: 'Diablo Swing Orchestra',
                            album,
                        },
                    },
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Eclectek_-_02_-_We_Are_Going_To_Eclecfunk_Your_Ass.mp3',
                        duration: 190.093061,
                        metaData: {
                            title: 'We Are Going To Eclecfunk Your Ass',
                            artist: 'Eclectek',
                            album,
                        },
                    },
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Auto-Pilot_-_03_-_Seventeen.mp3',
                        duration: 214.622041,
                        metaData: {
                            title: 'Seventeen',
                            artist: 'Auto-Pilot',
                            album,
                        },
                    },
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Muha_-_04_-_Microphone.mp3',
                        duration: 181.838367,
                        metaData: {
                            title: 'Microphone',
                            artist: 'Muha',
                            album,
                        },
                    },
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Just_Plain_Ant_-_05_-_Stumble.mp3',
                        duration: 86.047347,
                        metaData: {
                            title: 'Stumble',
                            artist: 'Just Plain Ant',
                            album,
                        },
                    },
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Sleaze_-_06_-_God_Damn.mp3',
                        duration: 226.795102,
                        metaData: {
                            title: 'God Damn',
                            artist: 'Sleaze',
                            album,
                        },
                    },
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Juanitos_-_07_-_Hola_Hola_Bossa_Nova.mp3',
                        duration: 207.072653,
                        metaData: {
                            title: 'Hola Hola Bossa Nova',
                            artist: 'Juanitos',
                            album,
                        },
                    },
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Entertainment_for_the_Braindead_-_08_-_Resolutions_Chris_Summer_Remix.mp3',
                        duration: 314.331429,
                        metaData: {
                            title: 'Resolutions (Chris Summer Remix)',
                            artist: 'Entertainment for the Braindead',
                            album,
                        },
                    },
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Nobara_Hayakawa_-_09_-_Trail.mp3',
                        duration: 204.042449,
                        metaData: {
                            title: 'Trail',
                            artist: 'Nobara Hayakawa',
                            album,
                        },
                    },
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/Paper_Navy_-_10_-_Tongue_Tied.mp3',
                        duration: 201.116735,
                        metaData: {
                            title: 'Tongue Tied',
                            artist: 'Paper Navy',
                            album,
                        },
                    },
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/60_Tigres_-_11_-_Garage.mp3',
                        duration: 245.394286,
                        metaData: {
                            title: 'Garage',
                            artist: '60 Tigres',
                            album,
                        },
                    },
                    {
                        url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/4b556fbf/CM_aka_Creative_-_12_-_The_Cycle_Featuring_Mista_Mista.mp3',
                        duration: 221.44,
                        metaData: {
                            title: 'The Cycle (Featuring Mista Mista)',
                            artist: 'CM aka Creative',
                            album,
                        },
                    },
                ];

                const webamp = new window.Webamp({
                    initialTracks,
                    enableHotkeys: false,
                    availableSkins: [
                        {
                            url: 'https://raw.githubusercontent.com/captbaritone/webamp-music/master/skins/base-2.91.wsz',
                            name: 'Base v2.91',
                        },
                    ],
                });

                webamp.renderWhenReady(container).then(function () {
                    if (boot) boot.remove();
                });
            })();
        </script>
    </body>
</html>
